name: Publish JavaScript Runtime

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  publish-javascript-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish pytincture runtime to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is not set; cannot publish the JavaScript runtime."
            exit 1
          fi
          npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN
          bash scripts/publish_runtime.sh
